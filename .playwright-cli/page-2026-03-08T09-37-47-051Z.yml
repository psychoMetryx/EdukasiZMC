    - generic [ref=e149]:
      - generic [ref=e150]:
        - heading "2) Tips perawatan di rumah" [level=2] [ref=e151]
        - paragraph [ref=e152]: "Konteks: sebagian besar batuk pilek bisa dibantu dengan terapi suportif. Langkah praktis: longgarkan hidung, cukupkan cairan, dan pantau 24-48 jam. Kapan evaluasi medis: bila napas memburuk, minum turun, atau muncul tanda bahaya."
      - generic [ref=e153]:
        - generic [ref=e154]:
          - article [ref=e155]:
            - heading "Cairan dan ASI" [level=3] [ref=e156]
            - list [ref=e157]:
              - listitem [ref=e158]: "Bayi kecil: susui lebih sering agar tidak dehidrasi dan lendir lebih mudah dikeluarkan."
              - listitem [ref=e159]: "Anak lebih besar: minum sedikit tapi sering; air putih, sup hangat, atau oralit bila ada risiko kurang cairan."
              - listitem [ref=e160]: Pantau pipis. Bila pipis jauh berkurang, anak perlu dinilai lebih cepat.
          - article [ref=e161]:
            - heading "Saline dan bersihkan hidung" [level=3] [ref=e162]
            - list [ref=e163]:
              - listitem [ref=e164]: Pakai tetes atau semprot saline steril untuk melonggarkan hidung tersumbat.
              - listitem [ref=e165]: Pada bayi atau balita kecil, boleh lanjut suction lembut terutama sebelum menyusu dan sebelum tidur.
              - listitem [ref=e166]: Bersihkan alat setelah dipakai agar tidak jadi sumber kuman.
          - article [ref=e167]:
            - heading "Udara lembap yang aman" [level=3] [ref=e168]
            - list [ref=e169]:
              - listitem [ref=e170]: Kalau memakai humidifier, pilih cool mist dan ganti air serta bersihkan alat rutin.
              - listitem [ref=e171]: Jangan pakai uap panas dekat anak karena ada risiko luka bakar.
              - listitem [ref=e172]: Kamar jangan pengap, tetapi juga tidak terlalu dingin.
          - article [ref=e173]:
            - heading "Posisi tidur" [level=3] [ref=e174]
            - list [ref=e175]:
              - listitem [ref=e176]: Bayi di bawah 1 tahun tetap tidur telentang di alas datar tanpa bantal atau ganjal longgar.
              - listitem [ref=e177]: Anak yang lebih besar boleh dibuat senyaman mungkin asalkan jalan napas terasa lebih lega.
              - listitem [ref=e178]: Hindari asap rokok di kamar dan kendaraan.
          - article [ref=e179]:
            - heading "Madu bila usia sudah 1 tahun" [level=3] [ref=e180]
            - list [ref=e181]:
              - listitem [ref=e182]: Madu bisa membantu meredakan batuk, terutama menjelang tidur.
              - listitem [ref=e183]: Dosis praktis di rumah sekitar setengah sampai satu sendok teh.
              - listitem [ref=e184]: Jangan berikan madu pada bayi di bawah 12 bulan.
          - article [ref=e185]:
            - heading "Pantau 24-48 jam" [level=3] [ref=e186]
            - list [ref=e187]:
              - listitem [ref=e188]: Cek suhu, napas, asupan minum, aktivitas, dan pipis.
              - listitem [ref=e189]: Catat kalau batuk makin berat, napas makin cepat, atau anak mulai sulit makan dan minum.
              - listitem [ref=e190]: Catatan sederhana ini membantu saat kontrol ke dokter.
        - generic [ref=e191]:
          - strong [ref=e192]: Rawat rumah tidak cukup
          - text: bila anak sesak, napas cepat, ada tarikan dinding dada, bibir kebiruan, tidak mau minum, pipis sangat sedikit, muntah terus, kejang, atau sangat lemas.
        - generic [ref=e193]:
          - strong [ref=e194]: "Catatan penting:"
          - text: tepuk punggung atau
          - emphasis [ref=e195]: back blow
          - text: adalah pertolongan saat tersedak dan jalan napas tersumbat, bukan terapi rutin untuk mengeluarkan dahak pada batuk pilek biasa.
    - generic [ref=e196]:
      - generic [ref=e197]:
        - heading "3) Tips pencegahan di rumah" [level=2] [ref=e198]
        - paragraph [ref=e199]: "Konteks: kambuh berulang sering berhubungan dengan paparan harian. Langkah praktis: perbaiki lingkungan rumah dan kebiasaan keluarga. Kapan evaluasi medis: jika keluhan tetap sering berulang walau lingkungan sudah dibenahi."
      - generic [ref=e200]:
        - generic [ref=e201]:
          - article [ref=e202]:
            - heading "Rumah bebas asap rokok" [level=3] [ref=e203]
            - paragraph [ref=e204]: Asap rokok membuat saluran napas anak lebih mudah iritasi dan meningkatkan risiko infeksi napas serta asma kambuh.
          - article [ref=e205]:
            - heading "Cuci tangan rutin" [level=3] [ref=e206]
            - paragraph [ref=e207]: Cuci tangan sebelum memegang anak, sebelum makan, sesudah batuk atau bersin, dan setelah dari luar rumah.
          - article [ref=e208]:
            - heading "Etika batuk bersin" [level=3] [ref=e209]
            - paragraph [ref=e210]: Tutup mulut dan hidung dengan tisu atau siku bagian dalam. Buang tisu segera dan cuci tangan.
          - article [ref=e211]:
            - heading "Ventilasi baik" [level=3] [ref=e212]
            - paragraph [ref=e213]: Usahakan sirkulasi udara tetap jalan agar kamar tidak lembap dan pengap, terutama pagi sampai siang.
          - article [ref=e214]:
            - heading "Kontrol debu dan tungau" [level=3] [ref=e215]
            - paragraph [ref=e216]: Ganti sprei rutin, bersihkan kasur, dan batasi boneka kain berlebih bila anak mudah pilek atau mengi.
          - article [ref=e217]:
            - heading "Imunisasi tetap jalan" [level=3] [ref=e218]
            - paragraph [ref=e219]: Ikuti jadwal imunisasi sesuai usia. Selesma ringan biasanya bukan alasan untuk menunda imunisasi rutin.
        - img "Ilustrasi checklist rumah sehat napas anak" [ref=e221]:
          - generic [ref=e223]: Checklist rumah sehat napas anak
          - generic [ref=e224]:
            - generic [ref=e227]: Tidak merokok di rumah dan mobil
            - generic [ref=e230]: Cuci tangan dan etika batuk
            - generic [ref=e233]: Ventilasi kamar tetap baik
            - generic [ref=e236]: Debu, tungau, dan jamur dikontrol
            - generic [ref=e239]: Imunisasi sesuai usia
          - generic [ref=e241]: Kalau masih sering kambuh
          - generic [ref=e242]: "cek apakah ada pencetus lain:"
          - generic [ref=e243]: asma, alergi, kontak TB,
          - generic [ref=e244]: atau paparan asap yang belum beres.
    - generic [ref=e245]:
      - generic [ref=e246]:
        - 'heading "4) Durasi gejala: batas waktu evaluasi" [level=2] [ref=e247]'
        - paragraph [ref=e248]: "Konteks: orang tua sering bingung kapan masih aman observasi. Langkah praktis: pakai batas waktu ini. Kapan evaluasi medis: bila melewati batas atau gejala malah memburuk."
      - generic [ref=e249]:
        - generic [ref=e250]:
          - article [ref=e251]:
            - heading "Hari 0-3" [level=3] [ref=e252]
            - list [ref=e253]:
              - listitem [ref=e254]: Selesma ringan biasanya mulai terlihat pada fase ini.
              - listitem [ref=e255]: Pantau napas, suhu, minum, dan pipis.
              - listitem [ref=e256]: Jika napas sudah cepat atau sesak sejak awal, jangan tunggu.
          - article [ref=e257]:
            - heading "Hari 4-7" [level=3] [ref=e258]
            - list [ref=e259]:
              - listitem [ref=e260]: Umumnya anak mulai membaik perlahan.
              - listitem [ref=e261]: Bila demam menetap lebih dari 4 hari atau batuk makin berat, anak perlu diperiksa.
              - listitem [ref=e262]: Anak yang tetap lemas atau tidak mau minum juga tidak boleh hanya diobservasi.
          - article [ref=e263]:
            - heading "Lebih dari 2 minggu" [level=3] [ref=e264]
            - list [ref=e265]:
              - listitem [ref=e266]: Batuk berkepanjangan perlu dicari penyebabnya, bukan hanya dianggap pilek biasa.
              - listitem [ref=e267]: Perlu pikirkan TB, asma, alergi, atau infeksi lain yang belum tuntas.
              - listitem [ref=e268]: Bawa catatan durasi batuk, demam, berat badan, dan kontak TB saat kontrol.
        - generic [ref=e269]: "Batas praktis: bila gejala pilek-batuk tidak membaik setelah sekitar 10 hari, anak perlu evaluasi medis. Bila batuk sudah lebih dari 2 minggu, apalagi disertai berat badan susah naik atau demam lama, pikirkan TB dan penyebab lain."
    - generic [ref=e270]:
      - generic [ref=e271]:
        - heading "5) Obat aman vs yang dihindari" [level=2] [ref=e272]
        - paragraph [ref=e273]: "Konteks: obat yang salah bisa berisiko pada balita. Langkah praktis: utamakan terapi suportif dan obat sesuai usia. Kapan evaluasi medis: bila orang tua ragu soal dosis atau jenis obat, konsultasikan dulu."
      - generic [ref=e274]:
        - generic [ref=e275]:
          - article [ref=e276]:
            - heading "Yang umumnya aman bila tepat pakai" [level=3] [ref=e277]
            - list [ref=e278]:
              - listitem [ref=e279]: Saline hidung dan suction lembut pada anak kecil.
              - listitem [ref=e280]: Obat penurun panas atau pereda nyeri sesuai usia dan berat badan.
              - listitem [ref=e281]: Madu untuk meredakan batuk pada anak usia 1 tahun ke atas.
          - article [ref=e282]:
            - heading "Yang perlu dihindari tanpa arahan" [level=3] [ref=e283]
            - list [ref=e284]:
              - listitem [ref=e285]: Obat batuk pilek kombinasi OTC umumnya tidak direkomendasikan untuk anak di bawah 6 tahun.
              - listitem [ref=e286]: Jangan menggabungkan beberapa obat bebas tanpa mengecek kandungan yang sama, terutama obat demam dan flu.
              - listitem [ref=e287]: Antibiotik tanpa pemeriksaan, karena selesma biasa paling sering disebabkan virus.
          - article [ref=e288]:
            - heading "Prinsip aman minum obat" [level=3] [ref=e289]
            - list [ref=e290]:
              - listitem [ref=e291]: Pakai alat ukur obat, bukan sendok makan biasa.
              - listitem [ref=e292]: Catat jam pemberian agar tidak dobel dosis.
              - listitem [ref=e293]: Kalau muntah berulang, muncul ruam, atau anak makin lemas setelah minum obat, hubungi tenaga kesehatan.
        - generic [ref=e294]:
