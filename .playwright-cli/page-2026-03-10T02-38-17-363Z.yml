    - generic [ref=e217]:
      - generic [ref=e218]:
        - heading "4) Gaya hidup harian yang paling berpengaruh" [level=2] [ref=e219]
        - paragraph [ref=e220]: "Konteks: flare sering berulang bukan hanya karena satu makanan. Langkah praktis: fokus ke berat badan, aktivitas fisik sedang, cairan, dan kebiasaan merokok. Kapan evaluasi medis: bila penurunan berat badan terlalu cepat, olahraga malah memicu cedera, atau ada komorbid yang membuat modifikasi perlu lebih hati-hati."
      - generic [ref=e221]:
        - generic [ref=e222]:
          - article [ref=e223]:
            - heading "Berat badan" [level=3] [ref=e224]
            - paragraph [ref=e225]: Menurut NIAMS dan IRA, menurunkan berat badan bila overweight membantu menurunkan kadar urat dan mengurangi flare. Tetapi diet yang terlalu ketat atau tinggi protein justru bukan arah yang baik.
          - article [ref=e226]:
            - heading "Aktivitas fisik" [level=3] [ref=e227]
            - paragraph [ref=e228]: Kemenkes dan IRA menyarankan latihan sedang secara rutin. Saat sendi sedang flare, fokus istirahat dulu; saat sudah reda, kembali ke jalan kaki, senam ringan, atau latihan sesuai kemampuan.
          - article [ref=e229]:
            - heading "Cairan" [level=3] [ref=e230]
            - paragraph [ref=e231]: Cukup minum membantu mengurangi risiko pengendapan kristal, terutama bila Anda gampang kurang minum, bekerja di luar ruangan, atau punya riwayat batu ginjal.
          - article [ref=e232]:
            - heading "Rokok dan pola harian" [level=3] [ref=e233]
            - paragraph [ref=e234]: IRA juga menyarankan menghentikan kebiasaan merokok. Ini bukan obat gout langsung, tetapi membantu kesehatan pembuluh darah dan komorbid yang sering jalan bareng dengan gout.
        - generic [ref=e235]:
          - strong [ref=e236]: "Target yang realistis:"
          - text: "bukan hidup serba pantang. Yang lebih berguna adalah perubahan yang tahan lama: minuman manis turun, berat badan turun perlahan, air cukup, dan olahraga sedang yang konsisten."
    - generic [ref=e237]:
      - generic [ref=e238]:
        - 'heading "5) Obat dan pemeriksaan: singkat, jelas, dan jangan tebak sendiri" [level=2] [ref=e239]'
        - paragraph [ref=e240]: "Konteks: ada obat untuk meredakan flare, ada juga obat untuk menurunkan kadar urat jangka panjang. Langkah praktis: pahami tujuan masing-masing dan bawa daftar obat rutin saat kontrol. Kapan evaluasi medis: bila serangan pertama, flare makin sering, ada benjolan keras, atau hasil laboratorium membingungkan."
      - generic [ref=e242]:
        - generic [ref=e243]:
          - paragraph [ref=e244]: NIAMS menjelaskan bahwa dokter bisa menilai gout melalui gejala, pemeriksaan sendi, riwayat obat, pemeriksaan laboratorium, dan pada sebagian kasus cairan sendi atau USG/CT khusus. Ini penting karena beberapa kondisi lain bisa mirip gout.
          - list [ref=e245]:
            - listitem [ref=e246]:
              - strong [ref=e247]: "Obat flare:"
              - text: dipakai untuk menurunkan nyeri dan bengkak saat serangan aktif.
            - listitem [ref=e248]:
              - strong [ref=e249]: "Obat penurun urat:"
              - text: dipakai untuk mengatasi penyebab dasar, terutama pada pasien dengan flare berulang, tofi, atau komplikasi.
            - listitem [ref=e250]:
              - strong [ref=e251]: "Pemeriksaan yang sering dibahas:"
              - text: kadar urat darah, fungsi ginjal, riwayat batu ginjal, serta obat yang sedang diminum seperti diuretik atau aspirin dosis rendah.
          - generic [ref=e252]: "Pesan aman: jangan membeli atau mengulang obat nyeri terus-menerus tanpa memastikan kondisi ginjal, lambung, tekanan darah, dan interaksi dengan obat lain. Bawa foto sendi saat bengkak jika saat kontrol nyerinya sudah reda."
        - generic [ref=e253]:
          - heading "Tiga alasan perlu kontrol terjadwal" [level=3] [ref=e254]
          - generic [ref=e255]:
            - generic [ref=e256]: "1"
            - paragraph [ref=e258]: Flare berulang bisa tetap merusak sendi walau tiap kali tampak "membaik sendiri".
          - generic [ref=e259]:
            - generic [ref=e260]: "2"
            - paragraph [ref=e262]: Gout sering jalan bareng hipertensi, diabetes, dislipidemia, penyakit jantung, dan gangguan ginjal.
          - generic [ref=e263]:
            - generic [ref=e264]: "3"
            - paragraph [ref=e266]: Bila sudah ada tofi atau batu ginjal, target terapi biasanya tidak cukup hanya dengan diet.
    - generic [ref=e267]:
      - generic [ref=e268]:
        - heading "6) Catatan kondisi khusus yang perlu dibahas saat kontrol" [level=2] [ref=e269]
        - paragraph [ref=e270]: "Konteks: tidak semua pasien gout punya risiko yang sama. Langkah praktis: cek komorbid dan obat rutin sebelum mengubah diet atau minum obat sendiri. Kapan evaluasi medis: lebih cepat bila ada CKD, diuretik, diabetes, batu ginjal, atau lansia dengan asupan minum yang sering kurang."
      - generic [ref=e271]:
        - generic [ref=e272]:
          - article [ref=e273]:
            - heading "Gangguan ginjal kronis" [level=3] [ref=e274]
            - paragraph [ref=e275]: Pasien CKD lebih mudah mengalami masalah pembuangan urat. Pemilihan obat dan dosis sering perlu penyesuaian, jadi jangan minum sembarang obat nyeri berulang.
          - article [ref=e276]:
            - heading "Hipertensi dan diuretik" [level=3] [ref=e277]
            - paragraph [ref=e278]: CDC, Kemenkes, dan IRA sama-sama menyinggung diuretik sebagai faktor risiko. Jangan menghentikan obat tekanan darah sendiri; yang benar adalah review obat bersama dokter.
          - article [ref=e279]:
            - heading "Diabetes, obesitas, penyakit jantung" [level=3] [ref=e280]
            - paragraph [ref=e281]: Komorbid ini sering berjalan bersama gout. Pendekatan makan lebih cocok bila sekaligus menurunkan gula, garam berlebih, dan berat badan secara bertahap.
          - article [ref=e282]:
            - heading "Batu ginjal dan lansia" [level=3] [ref=e283]
            - paragraph [ref=e284]: Riwayat batu ginjal membuat cairan menjadi perhatian khusus. Pada lansia, rasa haus sering tidak terlalu terasa, jadi target minum perlu lebih sengaja dijaga.
        - generic [ref=e285]:
