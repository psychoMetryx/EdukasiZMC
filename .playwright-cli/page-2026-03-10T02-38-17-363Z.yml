    - generic [ref=e67]:
      - generic [ref=e68]:
        - 'heading "1) Kenali polanya dulu: kadar asam urat tinggi tidak selalu sama dengan gout" [level=2] [ref=e69]'
        - paragraph [ref=e70]: "Konteks: banyak pasien baru tahu angka laboratorium, lalu mengira setiap nyeri sendi pasti asam urat. Langkah praktis: pahami bedanya kadar urat tinggi, flare gout, dan kerusakan kronis. Kapan evaluasi medis: bila nyeri sendi muncul mendadak, berulang, atau diagnosisnya belum pasti."
      - generic [ref=e72]:
        - generic [ref=e73]:
          - paragraph [ref=e74]: Menurut CDC dan NIAMS, gout adalah radang sendi akibat endapan kristal urat yang biasanya menyerang satu sendi pada satu waktu, paling sering di pangkal ibu jari kaki, pergelangan kaki, atau lutut. Flare biasanya datang mendadak, sangat nyeri, lalu mereda beberapa hari sampai sekitar 1-2 minggu.
          - paragraph [ref=e75]:
            - text: "Yang sering bikin bingung: kadar asam urat tinggi di darah bisa ada tanpa gejala. Jadi,"
            - strong [ref=e76]: hiperurisemia belum tentu gout
            - text: . Sebaliknya, kalau serangan berulang dibiarkan, gout bisa masuk fase kronis dan membentuk benjolan kristal yang disebut tofi.
          - list [ref=e77]:
            - listitem [ref=e78]:
              - strong [ref=e79]: "Hiperurisemia:"
              - text: angka urat tinggi, tetapi belum tentu ada nyeri atau bengkak.
            - listitem [ref=e80]:
              - strong [ref=e81]: "Flare gout:"
              - text: nyeri hebat, bengkak, merah, panas, sering muncul mendadak pada satu sendi.
            - listitem [ref=e82]:
              - strong [ref=e83]: "Interval tenang:"
              - text: di antara serangan, sendi bisa terasa normal lagi.
            - listitem [ref=e84]:
              - strong [ref=e85]: "Gout kronis / tofi:"
              - text: serangan makin sering, sendi bisa berubah bentuk, dan risiko ginjal meningkat.
          - generic [ref=e86]: "Pegangan pasien: jangan hanya mengejar angka laboratorium. Dokter tetap perlu mencocokkan gejala, riwayat serangan, obat yang dipakai, dan kadang pemeriksaan cairan sendi atau pencitraan."
        - generic [ref=e87]:
          - heading "Siapa yang lebih sering terkena" [level=3] [ref=e88]
          - generic [ref=e89]:
            - generic [ref=e90]: "1"
            - paragraph [ref=e92]: Lebih sering pada pria dewasa dan usia makin lanjut. Pada perempuan, risiko meningkat setelah menopause.
          - generic [ref=e93]:
            - generic [ref=e94]: "2"
            - paragraph [ref=e96]: Risiko naik pada orang dengan obesitas, hipertensi, gangguan ginjal kronis, sindrom metabolik, atau riwayat keluarga gout.
          - generic [ref=e97]:
            - generic [ref=e98]: "3"
            - paragraph [ref=e100]: Beberapa obat juga bisa memicu, terutama diuretik atau obat tertentu yang mengganggu pembuangan urat.
          - generic [ref=e101]:
            - strong [ref=e102]: Kapan curiga diagnosisnya belum aman?
            - text: Bila nyeri sendi pertama kali sangat berat, lokasi tidak khas, ada demam, atau ada luka di sekitar sendi. Jangan langsung menebak sendiri.
