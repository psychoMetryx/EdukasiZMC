        - paragraph [ref=e106]: "Konteks: saat flare, fokus utama adalah menurunkan nyeri dan bengkak dengan aman sambil memastikan bukan kondisi berbahaya. Langkah praktis: istirahatkan sendi, kompres dingin, cukup minum, dan evaluasi pemicu. Kapan evaluasi medis: bila nyeri sangat berat, flare pertama, atau ada demam."
