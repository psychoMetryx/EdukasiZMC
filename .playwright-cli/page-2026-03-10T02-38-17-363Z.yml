      - generic [ref=e18]:
        - 'heading "Nyeri sendi yang datang mendadak, merah, panas, dan sangat nyut-nyutan sering cocok dengan flare asam urat. Yang tidak boleh dianggap sepele: demam, tidak bisa menopang badan, atau curiga infeksi." [level=2] [ref=e19]'
        - paragraph [ref=e20]: Halaman ini dibuat untuk pasien dewasa dan lansia. Fokusnya bukan cuma daftar makanan, tetapi juga membedakan kadar asam urat tinggi dengan gout, mengenali pemicu, langkah aman saat kambuh, dan waktu periksa yang tepat.
