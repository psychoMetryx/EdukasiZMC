        - generic [ref=e203]:
          - heading "4) Gaya hidup harian yang paling berpengaruh" [level=2] [ref=e204]
          - paragraph [ref=e205]: Flare berulang biasanya bukan cuma soal satu makanan. Yang paling berpengaruh justru berat badan, aktivitas fisik, cairan, dan kebiasaan harian; evaluasi lebih cepat bila ada komorbid atau penurunan berat badan terlalu agresif.
      - generic [ref=e206]:
        - generic [ref=e207]:
          - generic [ref=e208]:
            - heading "Berat badan dan makan harian" [level=3] [ref=e209]
            - paragraph [ref=e210]: Menurunkan berat badan bila overweight membantu menurunkan kadar urat dan mengurangi flare. Yang dihindari justru diet terlalu ketat atau tinggi protein.
            - heading "Cairan" [level=3] [ref=e211]
            - paragraph [ref=e212]: Cukup minum membantu mengurangi risiko pengendapan kristal, terutama bila Anda gampang kurang minum, bekerja di luar ruangan, atau punya riwayat batu ginjal.
          - generic [ref=e213]:
            - heading "Aktivitas fisik" [level=3] [ref=e214]
            - paragraph [ref=e215]: Latihan sedang secara rutin lebih berguna daripada olahraga meledak-ledak. Saat sendi sedang flare, istirahat dulu; saat reda, kembali ke jalan kaki atau senam ringan.
            - heading "Rokok dan pola harian" [level=3] [ref=e216]
            - paragraph [ref=e217]: Menghentikan rokok tidak mengobati gout secara langsung, tetapi membantu pembuluh darah dan komorbid yang sering berjalan bersama gout.
        - paragraph [ref=e218]:
          - strong [ref=e219]: "Target realistis:"
          - text: minuman manis turun, berat badan turun perlahan, air cukup, dan olahraga sedang yang konsisten.
