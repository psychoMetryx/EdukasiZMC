              - listitem [ref=e242]: Jangan mulai, hentikan, atau ganti obat jangka panjang tanpa arahan dokter yang memantau.
        - generic [ref=e243]:
          - generic [ref=e244]:
            - paragraph [ref=e245]: Diagnosis gout dilihat dari gejala, pemeriksaan sendi, riwayat obat, dan pemeriksaan penunjang bila perlu. Ini penting karena beberapa penyakit lain bisa mirip gout.
            - list [ref=e246]:
