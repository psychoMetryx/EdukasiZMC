          - paragraph [ref=e61]: CDC dan NIAMS menjelaskan bahwa gout adalah radang sendi akibat kristal urat. Biasanya menyerang satu sendi, paling sering ibu jari kaki, pergelangan kaki, atau lutut, lalu datang mendadak dan sangat nyeri.
          - paragraph [ref=e62]:
            - strong [ref=e63]: Hiperurisemia belum tentu gout.
            - text: Dokter tetap melihat pola serangan, lokasi sendi, obat yang dipakai, dan kadang pemeriksaan sendi atau pencitraan.
