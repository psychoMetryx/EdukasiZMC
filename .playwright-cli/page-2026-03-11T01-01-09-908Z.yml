          - paragraph [ref=e228]: "Obat gout dibagi dua: untuk meredakan flare dan untuk menurunkan urat jangka panjang. Bila serangan pertama, flare makin sering, ada benjolan keras, atau hasil lab membingungkan, kontrol."
