            - heading "Obat untuk serangan aktif" [level=3] [ref=e232]
            - list [ref=e233]:
              - listitem [ref=e234]: Yang sering dipakai adalah antiinflamasi, kolkisin, atau kortikosteroid sesuai penilaian dokter.
              - listitem [ref=e235]: Pilihannya harus disesuaikan dengan fungsi ginjal, lambung, tekanan darah, diabetes, dan obat lain yang sedang diminum.
