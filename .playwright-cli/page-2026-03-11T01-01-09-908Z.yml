              - listitem [ref=e257]: Gout sering berjalan bersama hipertensi, diabetes, dislipidemia, penyakit jantung, dan gangguan ginjal.
              - listitem [ref=e258]: Bila sudah ada tofi atau batu ginjal, target terapi biasanya tidak cukup hanya dengan diet.
