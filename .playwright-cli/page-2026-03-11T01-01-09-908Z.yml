          - paragraph [ref=e58]: Jangan berhenti di angka laboratorium saja. Bedakan dulu hiperurisemia, flare gout, dan gout kronis; bila nyeri sendi datang mendadak, berulang, atau diagnosis belum jelas, periksa.
      - generic [ref=e59]:
