    - main [ref=e42]:
      - generic [ref=e43]:
        - 'heading "1) Pahami dulu: maag, asam lambung, dan tukak itu tidak selalu sama" [level=2] [ref=e44]'
        - paragraph [ref=e45]: Pasien sering menyebut semua nyeri ulu hati sebagai "maag". Padahal keluhan lambung bisa berasal dari dispepsia, refluks asam lambung, sampai tukak lambung. Bedanya penting karena arah evaluasi dan tanda bahayanya tidak sama.
        - generic [ref=e46]:
          - article [ref=e47]:
            - heading "Maag / dispepsia" [level=3] [ref=e48]
            - paragraph [ref=e49]: Biasanya terasa sebagai nyeri ulu hati, begah, mual, cepat kenyang, atau perut bagian atas terasa tidak nyaman setelah makan. Keluhan ini bisa dipicu pola makan, stres, rokok, kopi, atau obat tertentu.
            - generic [ref=e50]:
              - strong [ref=e51]: "Kapan evaluasi:"
              - text: periksa bila keluhan berulang, mengganggu makan, atau tidak membaik dalam 1-2 minggu.
          - article [ref=e52]:
            - heading "Asam lambung naik (GERD)" [level=3] [ref=e53]
            - paragraph [ref=e54]: Keluhan khasnya rasa panas dari ulu hati ke dada, mulut terasa asam atau pahit, dan sering kambuh setelah makan besar atau saat berbaring. Pada sebagian orang juga muncul batuk malam atau suara serak.
            - generic [ref=e55]:
              - strong [ref=e56]: "Kapan evaluasi:"
              - text: periksa bila keluhan sering kambuh malam, butuh obat terus-menerus, atau sampai mengganggu tidur.
          - article [ref=e57]:
            - heading "Tukak lambung / usus dua belas jari" [level=3] [ref=e58]
            - paragraph [ref=e59]:
              - text: Ini adalah luka pada dinding lambung atau usus dua belas jari. Penyebab yang sering dibahas dalam panduan resmi adalah infeksi
              - emphasis [ref=e60]: H. pylori
              - text: dan penggunaan obat anti-nyeri golongan NSAID terlalu sering.
            - generic [ref=e61]:
              - strong [ref=e62]: "Kapan evaluasi:"
              - text: curiga bila ada muntah darah, BAB hitam, lemas berat, atau nyeri menetap yang makin berat.
        - generic [ref=e63]:
          - strong [ref=e64]: "Catatan penting:"
          - text: nyeri lambung kadang mirip nyeri jantung. Kalau nyeri dada terasa menekan, menjalar ke rahang/lengan/punggung, disertai sesak, keringat dingin, atau hampir pingsan, anggap darurat sampai terbukti bukan.
      - generic [ref=e65]:
        - heading "2) Langkah aman di rumah selama 24-48 jam" [level=2] [ref=e66]
        - paragraph [ref=e67]: Langkah ini cocok untuk keluhan ringan sampai sedang yang polanya mirip kambuhan biasa dan tidak disertai tanda bahaya. Tujuannya bukan menunda pemeriksaan, tetapi mengurangi iritasi sambil memantau apakah gejala membaik atau justru memburuk.
        - generic [ref=e68]:
          - generic [ref=e69]:
            - heading "Yang sebaiknya dilakukan" [level=3] [ref=e70]
            - list [ref=e71]:
              - listitem [ref=e72]: Makan porsi kecil tetapi lebih sering. Hindari makan sangat banyak sekaligus.
              - listitem [ref=e73]: Berikan jeda sekitar 2-3 jam antara makan malam dan waktu tidur.
              - listitem [ref=e74]: Kalau keluhan sering muncul saat malam, tinggikan kepala saat tidur dan hindari rebahan setelah makan.
              - listitem [ref=e75]: Minum cukup air putih dan pilih makanan yang lebih ringan, tidak terlalu berminyak, tidak terlalu pedas, dan tidak terlalu asam.
              - listitem [ref=e76]: Catat pemicu pribadi seperti kopi pekat, sambal, gorengan, rokok, stres, atau makan terlalu larut.
            - generic [ref=e77]:
              - strong [ref=e78]: "Tanda membaik:"
              - text: nyeri berkurang, mual turun, bisa makan lebih nyaman, dan tidak ada keluhan baru.
          - generic [ref=e79]:
            - heading "Yang perlu dibatasi atau dihindari" [level=3] [ref=e80]
            - list [ref=e81]:
              - listitem [ref=e82]: Merokok, alkohol, soda, minuman energi, dan kopi atau teh pekat saat perut kosong.
              - listitem [ref=e83]: Gorengan, makanan sangat pedas, dan makan besar menjelang tidur.
              - listitem [ref=e84]: Obat anti-nyeri golongan NSAID seperti ibuprofen, aspirin dosis nyeri, atau asam mefenamat tanpa arahan dokter.
              - listitem [ref=e85]:
                - text: Mengobati sendiri dugaan
                - emphasis [ref=e86]: H. pylori
                - text: dengan antibiotik tanpa pemeriksaan dan resep yang benar.
              - listitem [ref=e87]: Membiarkan keluhan lama tanpa evaluasi jika gejalanya berubah atau makin sering kambuh.
            - generic [ref=e88]:
              - strong [ref=e89]: "Segera naik level evaluasi:"
              - text: bila dalam 24-48 jam keluhan tidak membaik, justru makin berat, atau muncul muntah berulang, sulit makan, dan lemas.
        - generic [ref=e90]:
          - strong [ref=e91]: "Kondisi khusus yang perlu lebih cepat konsultasi:"
          - text: hamil, usia lanjut, penyakit ginjal/hati/jantung, riwayat tukak atau perdarahan lambung, penggunaan pengencer darah, atau riwayat alergi obat berat.
      - generic [ref=e92]:
        - 'heading "3) Panduan makan lokal Sunda: mana yang lebih aman, mana yang sering memicu" [level=2] [ref=e93]'
        - paragraph [ref=e94]: Tidak semua makanan memicu pada semua orang. Daftar ini dipakai sebagai titik awal. Setelah gejala mereda, makanan bisa diuji satu per satu dengan porsi kecil untuk melihat respon tubuh.
        - generic [ref=e95]:
          - generic [ref=e96]:
            - generic [ref=e97]:
              - heading "Lebih aman saat lambung sedang sensitif" [level=3] [ref=e98]
              - list [ref=e99]:
                - listitem [ref=e100]: Nasi hangat dengan lauk rebus, kukus, pepes, atau panggang ringan bumbu.
                - listitem [ref=e101]: Pepes ikan atau tahu tanpa cabai berlebihan.
                - listitem [ref=e102]: Sayur bening, sop bening, tumis ringan dengan minyak sedikit.
                - listitem [ref=e103]: Buah yang cenderung tidak asam seperti pisang dan pepaya.
                - listitem [ref=e104]: Camilan sederhana seperti biskuit tawar bila jeda makan terlalu panjang.
            - generic [ref=e105]:
              - heading "Sering perlu dibatasi saat kambuh" [level=3] [ref=e106]
              - list [ref=e107]:
                - listitem [ref=e108]: Seblak, sambal sangat pedas, kuah sangat asam, dan makanan berempah sangat kuat.
                - listitem [ref=e109]: Bala-bala, gehu, cireng goreng, dan gorengan lain yang berminyak.
                - listitem [ref=e110]: Kopi tubruk pekat, soda, minuman energi, dan makan mi atau gorengan larut malam.
                - listitem [ref=e111]: Porsi besar sekaligus walaupun jenis makanannya terasa "aman".
          - complementary "Ringkasan praktis makanan dan pemicu" [ref=e112]:
            - generic [ref=e113]:
              - generic [ref=e116]: 
              - generic [ref=e117]:
                - strong [ref=e118]: Pilih cara masak ringan
                - text: Rebus, kukus, pepes, dan kuah bening biasanya lebih mudah diterima lambung dibanding goreng atau tumis berat.
            - generic [ref=e119]:
              - generic [ref=e122]: 
              - generic [ref=e123]:
                - strong [ref=e124]: Pedas bukan satu-satunya pemicu
                - text: Makan terlalu larut, kopi pekat, porsi besar, rokok, dan stres juga sering ikut berperan.
            - generic [ref=e125]:
              - generic [ref=e128]: 
              - generic [ref=e129]:
                - strong [ref=e130]: Catat pola tubuh sendiri
                - text: Jika makanan tertentu selalu memicu 2-3 kali, kemungkinan besar memang perlu dibatasi lebih lama.
            - generic [ref=e131]:
              - generic [ref=e134]: 
              - generic [ref=e135]:
                - strong [ref=e136]: Kapan periksa
                - text: Bila makan makin sulit, turun berat badan, atau nyeri tetap berat walau sudah mengurangi pemicu.
      - generic [ref=e137]:
        - heading "4) Kapan cukup periksa ke dokter, dan kapan harus langsung ke IGD" [level=2] [ref=e138]
        - paragraph [ref=e139]: Bagian ini penting karena banyak pasien menunggu terlalu lama. Keluhan lambung yang ringan memang bisa dipantau singkat, tetapi ada gejala yang harus dianggap darurat.
        - generic [ref=e140]:
          - generic [ref=e141]:
            - heading "Periksa ke dokter dalam waktu dekat bila:" [level=3] [ref=e142]
            - list [ref=e143]:
              - listitem [ref=e144]: Keluhan tidak membaik dalam 1-2 minggu atau makin sering kambuh.
              - listitem [ref=e145]: Sering perlu obat lambung terus-menerus untuk bisa nyaman.
              - listitem [ref=e146]: Nyeri atau rasa panas sering muncul malam hari dan mengganggu tidur.
              - listitem [ref=e147]: Sering mual, cepat kenyang, nafsu makan turun, atau berat badan mulai turun.
              - listitem [ref=e148]: Ada riwayat tukak lambung, perdarahan lambung, atau sering minum NSAID.
            - generic [ref=e149]:
              - strong [ref=e150]: "Tujuan periksa:"
              - text: memastikan ini memang keluhan lambung biasa, bukan tukak, efek obat, atau penyakit lain yang butuh tata laksana berbeda.
          - generic [ref=e151]:
            - heading "Segera ke IGD bila ada tanda bahaya ini:" [level=3] [ref=e152]
            - list [ref=e153]:
              - listitem [ref=e154]: Nyeri dada berat atau menekan, terutama jika menjalar ke rahang, lengan, punggung, atau disertai sesak.
              - listitem [ref=e155]: Muntah darah, muntah seperti kopi, atau BAB hitam seperti aspal.
              - listitem [ref=e156]: Muntah terus-menerus sampai tidak bisa masuk minum atau tampak dehidrasi.
              - listitem [ref=e157]: Sulit menelan, nyeri menelan yang makin berat, atau makanan seperti tersangkut.
              - listitem [ref=e158]: Lemas berat, pusing, keringat dingin, hampir pingsan, atau pingsan.
            - generic [ref=e159]:
              - strong [ref=e160]: "Jangan ditunda sampai besok:"
              - text: red flag ini bisa menandakan perdarahan, dehidrasi berat, sumbatan, atau masalah jantung yang kebetulan terasa seperti maag.
