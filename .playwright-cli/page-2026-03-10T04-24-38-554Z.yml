          - heading "1) Kenali DBD dulu" [level=2] [ref=e80]
          - paragraph [ref=e81]: "Konteks: DBD adalah infeksi virus dengue yang ditularkan nyamuk Aedes. Langkah praktis: kenali gejala awal dan selalu catat hari sakit. Kapan evaluasi medis: periksa bila demam tinggi disertai nyeri badan hebat, muntah, ruam, atau pasien tinggal di area dengan risiko dengue."
      - generic [ref=e83]:
        - generic [ref=e84]:
          - paragraph [ref=e85]: WHO menjelaskan bahwa banyak infeksi dengue ringan atau tanpa gejala, tetapi pada orang yang sakit, keluhan yang paling sering adalah demam tinggi, sakit kepala, nyeri belakang mata, nyeri otot dan sendi, mual, muntah, dan ruam. CDC juga menekankan bahwa gejala umumnya berlangsung 2-7 hari, sehingga catatan hari sakit membantu keluarga melihat kapan masuk fase yang lebih berisiko.
