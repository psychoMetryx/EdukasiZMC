        - paragraph [ref=e329]: "Konteks: makan bergizi bisa tetap hemat dan realistis untuk keluarga sehari-hari. Langkah praktis: pakai menu lokal berbasis usia dan tekstur. Kapan evaluasi medis: jika asupan tetap sangat minim atau berat stagnan meski menu sudah dibenahi."
      - generic [ref=e330]:
