            - list [ref=e376]:
              - listitem [ref=e377]: Asupan tetap minim meski menu dan jadwal sudah dibenahi 2-4 minggu.
              - listitem [ref=e378]: Anak muntah berulang atau sering tersedak pada banyak jenis menu.
              - listitem [ref=e379]: Berat stagnan/turun disertai anak terlihat lemas.
