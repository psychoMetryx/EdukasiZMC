    - generic [ref=e381]:
      - generic [ref=e382]:
        - heading "11) Anemia" [level=2] [ref=e383]
        - paragraph [ref=e384]: "Konteks: anemia pada anak sering tidak disadari sampai anak terlihat pucat dan mudah lelah. Langkah praktis: kenali faktor risiko, gejala, dan perbaiki asupan zat besi sejak dini. Kapan evaluasi medis: segera bila gejala konsisten atau pertumbuhan terdampak."
      - generic [ref=e385]:
        - generic [ref=e386]:
          - article [ref=e387]:
            - heading "Faktor risiko" [level=3] [ref=e388]
            - list [ref=e389]:
              - listitem [ref=e390]: Asupan zat besi kurang setelah usia 6 bulan.
              - listitem [ref=e391]: Lahir prematur/berat lahir rendah atau riwayat anemia ibu saat hamil.
              - listitem [ref=e392]: Pola makan sangat terbatas, dominan karbo dan minim lauk hewani.
          - article [ref=e393]:
            - heading "Tanda klinis sederhana" [level=3] [ref=e394]
            - list [ref=e395]:
              - listitem [ref=e396]: Pucat pada bibir/gusi/kelopak mata.
              - listitem [ref=e397]: Anak tampak cepat lelah, lesu, kurang aktif.
              - listitem [ref=e398]: Nafsu makan menurun, mudah rewel, kadang sulit fokus.
          - article [ref=e399]:
            - heading "Pencegahan harian" [level=3] [ref=e400]
            - list [ref=e401]:
              - listitem [ref=e402]: "Sumber zat besi: daging, hati, ayam, ikan, telur, kacang-kacangan."
              - listitem [ref=e403]: Padukan dengan vitamin C (jeruk, tomat, jambu, pepaya) agar serapan besi lebih baik.
              - listitem [ref=e404]: Batasi minuman manis saat jam makan karena menggeser asupan bergizi.
          - article [ref=e405]:
            - heading "Contoh pairing menu" [level=3] [ref=e406]
            - list [ref=e407]:
              - listitem [ref=e408]: Nasi + ayam/ikan + tumis sayur + potongan pepaya.
              - listitem [ref=e409]: Bubur kacang hijau kental + buah tinggi vitamin C.
              - listitem [ref=e410]: Telur + sayur + tomat/jeruk setelah makan utama.
          - article [ref=e411]:
            - heading "Kapan cek Hb / kontrol" [level=3] [ref=e412]
            - list [ref=e413]:
              - listitem [ref=e414]: Anak terlihat pucat lebih dari 1-2 minggu.
              - listitem [ref=e415]: Terdapat gejala lemas berkepanjangan, nafsu makan turun, berat stagnan.
              - listitem [ref=e416]: Ada faktor risiko tinggi dan respons makan tidak membaik.
        - generic [ref=e417]:
          - strong [ref=e418]: "Catatan:"
          - text: keputusan pemeriksaan Hb dan terapi besi tetap perlu evaluasi dokter agar dosis dan lama terapi tepat.
    - generic [ref=e419]:
      - generic [ref=e420]:
        - heading "12) Kebersihan Makanan" [level=2] [ref=e421]
        - paragraph [ref=e422]: "Konteks: makanan bagus gizinya bisa tetap berbahaya kalau kebersihan dan penyimpanannya kurang tepat. Langkah praktis: jalankan alur higienis dari belanja sampai penyajian. Kapan evaluasi medis: bila ada tanda infeksi saluran cerna atau keracunan makanan."
      - generic [ref=e423]:
        - generic [ref=e424]:
          - article [ref=e425]:
            - heading "1) Sebelum menyiapkan makanan" [level=3] [ref=e426]
            - list [ref=e427]:
              - listitem [ref=e428]: Cuci tangan pakai sabun minimal 20 detik sebelum masak dan sebelum menyuapi.
              - listitem [ref=e429]: Bersihkan meja, talenan, sendok, blender, dan wadah makan.
              - listitem [ref=e430]: Bedakan alat untuk bahan mentah dan makanan matang bila memungkinkan.
          - article [ref=e431]:
            - heading "2) Pemilihan bahan" [level=3] [ref=e432]
            - list [ref=e433]:
              - listitem [ref=e434]: Pilih bahan segar, tidak bau, tidak berlendir, tidak berubah warna.
              - listitem [ref=e435]: Gunakan air bersih untuk mencuci bahan dan memasak.
              - listitem [ref=e436]: Hindari produk tidak dipasteurisasi untuk anak kecil.
          - article [ref=e437]:
            - heading "3) Pemasakan matang" [level=3] [ref=e438]
            - list [ref=e439]:
              - listitem [ref=e440]: Masak lauk hewani sampai matang merata.
              - listitem [ref=e441]: Panaskan ulang makanan sisa sampai benar-benar panas sebelum disajikan lagi.
              - listitem [ref=e442]: Jangan mencampur makanan matang dengan bahan mentah.
          - article [ref=e443]:
            - heading "4) Penyimpanan aman" [level=3] [ref=e444]
            - list [ref=e445]:
              - listitem [ref=e446]: Makanan yang tidak habis segera ditutup dan simpan di suhu aman.
              - listitem [ref=e447]: Jangan biarkan makanan matang terlalu lama di suhu ruang.
              - listitem [ref=e448]: Berikan label waktu simpan agar tidak lupa kapan harus dibuang.
          - article [ref=e449]:
            - heading "5) Alat makan dan minum anak" [level=3] [ref=e450]
            - list [ref=e451]:
              - listitem [ref=e452]: Cuci botol, cup, sedotan, sendok dengan air bersih dan sabun lalu keringkan.
              - listitem [ref=e453]: Periksa bagian sempit (sedotan/tutup botol) karena mudah jadi tempat kuman.
              - listitem [ref=e454]: Ganti alat yang retak, kusam berat, atau sulit dibersihkan.
          - article [ref=e455]:
            - heading "6) Keamanan saat makan" [level=3] [ref=e456]
            - list [ref=e457]:
              - listitem [ref=e458]: Anak duduk saat makan, tidak sambil lari atau bermain.
              - listitem [ref=e459]: Potong makanan sesuai ukuran aman untuk usia anak.
              - listitem [ref=e460]: "Hindari makanan risiko tersedak: bulat keras, kecil-lengket, atau utuh."
        - generic [ref=e461]:
          - strong [ref=e462]: "5 pesan inti keamanan pangan:"
          - text: jaga kebersihan, pisahkan mentah-matang, masak matang sempurna, simpan pada suhu aman, dan gunakan air/bahan yang aman.
