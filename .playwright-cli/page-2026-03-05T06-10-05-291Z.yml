              - listitem [ref=e337]: "Malam: bubur beras + telur + bayam halus."
              - listitem [ref=e338]: "Selingan: buah lumat (pisang/pepaya) atau bubur kacang hijau kental halus."
          - article [ref=e339]:
            - heading "Menu 9-11 bulan (lumat kasar/cincang lembut)" [level=3] [ref=e340]
            - list [ref=e341]:
              - listitem [ref=e342]: "Pagi: nasi tim lembek + telur orak-arik + tomat halus."
              - listitem [ref=e343]: "Siang: nasi lembek + pepes ikan non-pedas + sayur cincang halus."
              - listitem [ref=e344]: "Malam: bubur oat kental + ayam cincang + brokoli lunak."
              - listitem [ref=e345]: "Selingan: potongan buah lunak kecil atau tahu kukus lembut."
          - article [ref=e346]:
            - heading "Menu 12-23 bulan (makanan keluarga potong aman)" [level=3] [ref=e347]
            - list [ref=e348]:
              - listitem [ref=e349]: "Pagi: nasi + telur dadar iris + tumis bayam lembut."
              - listitem [ref=e350]: "Siang: nasi + semur ayam + sayur bening + buah potong."
              - listitem [ref=e351]: "Malam: nasi + ikan kuah kuning non-pedas + tumis buncis lembut."
              - listitem [ref=e352]: "Selingan: jagung lembut pipil halus, ubi kukus, atau yoghurt plain sesuai toleransi."
          - article [ref=e353]:
            - heading "Menu 2-5 tahun (makanan keluarga terjadwal)" [level=3] [ref=e354]
            - list [ref=e355]:
              - listitem [ref=e356]: "Pagi: nasi/lontong + telur + sayur."
              - listitem [ref=e357]: "Siang: nasi + lauk hewani + sayur + buah."
              - listitem [ref=e358]: "Malam: nasi + tahu/tempe + ikan/ayam + sayur."
              - listitem [ref=e359]: "Selingan: buah, puding rumahan rendah gula, atau roti isi telur/keju secukupnya."
          - article [ref=e360]:
            - heading "Makanan dibatasi + alasan" [level=3] [ref=e361]
            - list [ref=e362]:
              - listitem [ref=e363]: "Minuman manis kemasan/teh manis/sirup: bikin cepat kenyang palsu, risiko gigi dan berat badan tidak sehat."
              - listitem [ref=e364]: "Gorengan terlalu sering (bala-bala/gehu harian): lemak berlebih, mudah menggantikan menu utama."
              - listitem [ref=e365]: "Makanan ultra-proses tinggi gula/garam: bisa mengganggu pola lapar alami dan kebiasaan rasa."
              - listitem [ref=e366]: "Makanan bulat keras/utuh (anggur utuh, kacang utuh): risiko tersedak."
          - article [ref=e367]:
            - heading "Alternatif aman" [level=3] [ref=e368]
            - list [ref=e369]:
              - listitem [ref=e370]: Ganti minuman manis dengan air putih atau susu sesuai anjuran usia.
              - listitem [ref=e371]: Camilan garing tinggi garam diganti buah potong, umbi kukus, atau olahan rumah minim gula.
              - listitem [ref=e372]: "Buat versi anak dari menu keluarga: bumbu lembut, non-pedas, potongan aman."
